<!doctype html>
<html lang="en">
  <head>

    <title>With label</title>
    <link href="/assets/css/avatars/preview.css" rel="stylesheet" />
  </head>
  <body>
    <div class="bg-white py-12">
      <div class="mx-auto flex max-w-6xl flex-col items-start gap-y-6 px-8 lg:flex-row lg:items-center lg:justify-around">
        <!--@snippet-->
        <!-- avatar-xl -->
        <div class="flex items-center gap-x-4">

            </span>
          </div>
          <div>
            <p class="text-lg font-semibold text-gray-700">Lila Bennett</p>
            <p class="text-base font-normal text-gray-500">lila@prismcore.com</p>
          </div>
        </div>
        <!-- avatar-lg -->
        <div class="flex items-center gap-x-3">

        <div class="flex items-center gap-x-2">

            <span class="relative rounded-full">
              <span aria-hidden="true" class="absolute inset-0 h-10 w-10 rounded-full ring-1 ring-inset ring-gray-900/10"></span>
