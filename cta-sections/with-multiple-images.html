<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>With multiple images</title>
    <link href="/assets/css/ctas/preview.css" rel="stylesheet" />
  </head>
  <body>
    <!--@snippet-->
    <div class="overflow-clip bg-white py-24 sm:py-32">
      <div class="relative mx-auto max-w-2xl px-6 text-center lg:px-8">
        <h2 class="mx-auto max-w-2xl text-4xl font-semibold tracking-tight text-gray-900 sm:text-5xl">Join our community today</h2>
        <p class="mx-auto mt-6 max-w-xl text-lg text-gray-600">Join us in our mission to innovate and inspire. As a member, you’ll have access to exclusive resources, collaborative opportunities, and a network of like-minded professionals who are passionate about making a difference</p>
        <div class="my-10 flex flex-none items-center justify-center gap-x-6">
          <a href="#" class="rounded-md bg-pink-500 px-3.5 py-2.5 text-sm font-semibold text-white hover:bg-pink-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-pink-500">Join now</a>
        </div>
        <div class="absolute left-1/2 grid w-[64rem] -translate-x-1/2 grid-cols-5 gap-x-6 lg:contents">
          <div class="lg: mt-32 aspect-[3/4] w-full overflow-clip rounded-xl lg:absolute lg:-left-48 lg:top-[30rem] lg:mt-0 lg:aspect-[4/3] lg:w-80 lg:-translate-x-full">
            <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=1600&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" />
          </div>
          <div class="mt-24 aspect-[3/4] w-full overflow-clip rounded-xl lg:absolute lg:-left-20 lg:top-12 lg:mt-0 lg:w-52 lg:-translate-x-full">
            <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1542596594-649edbc13630?q=80&w=800&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" />
          </div>
          <div class="mt-16 aspect-[3/4] w-full overflow-clip rounded-xl lg:absolute lg:right-2 lg:top-96 lg:mt-0 lg:w-64 lg:translate-x-full">
            <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=800&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" />
          </div>
          <div class="mt-8 aspect-[3/4] w-full overflow-clip rounded-xl lg:absolute lg:left-40 lg:top-96 lg:mt-0 lg:aspect-square lg:w-72 lg:-translate-x-full">
            <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" />
          </div>
          <div class="aspect-[3/4] w-full overflow-clip rounded-xl lg:absolute lg:-right-20 lg:-top-4 lg:aspect-[4/3] lg:w-[28rem] lg:translate-x-full">
            <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1532635241-17e820acc59f?q=80&w=1600&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" />
          </div>
        </div>
        <div aria-hidden="true" class="h-[22rem] w-full lg:h-96"></div>
      </div>
    </div>
    <!--@endsnippet-->
  </body>
</html>
