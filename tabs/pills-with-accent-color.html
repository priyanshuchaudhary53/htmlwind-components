<!doctype html>
<html lang="en">
  <head>

    <title>Pills with accent color</title>
    <link href="/assets/css/tab/preview.css" rel="stylesheet" />

              <a href="#" class="inline-flex  px-3 py-2 text-sm rounded-md font-semibold text-gray-500 hover:text-gray-700">Settings</a>

          </div>
